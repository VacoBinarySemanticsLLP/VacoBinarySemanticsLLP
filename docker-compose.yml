services:
  web:
    build: .
    restart: always
    env_file: .env
    ports:
      - "9007:9007"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - default
      - caddy_network
    labels:
      caddy: git-stats.teamsphere.in
      caddy.reverse_proxy: "{{upstreams 9007}}"

networks:
  caddy_network:
    external: true
